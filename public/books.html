<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .book-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .book-info h3 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        .book-info p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .book-info .status {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status.read {
            background-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .status.unread {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button.delete-btn {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        button.delete-btn:hover {
            background: linear-gradient(135deg, #f87171, #dc2626);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(239, 68, 68, 0.4);
        }
        
        .nav-link {
            display: inline-block;
            margin-top: 40px;
            color: #818cf8;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #c084fc;
        }

        .loader {
            color: #818cf8;
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
        }

        .fade-out {
            opacity: 0;
            transform: translateX(100px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input[type="text"], .form-group input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .save-btn:hover {
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .add-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Book Library</h1>

    <div class="top-bar">
        <button class="add-btn" id="open-modal-btn">+ Add New Book</button>
    </div>

    <!-- Add Book Modal -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h2>Add New Book</h2>
            <form id="add-form">
                <div class="form-group">
                    <input type="text" id="add-title" placeholder="Book Title" required>
                </div>
                <div class="form-group">
                    <input type="text" id="add-author" placeholder="Author" required>
                </div>
                <div class="form-group">
                    <input type="number" id="add-year" placeholder="Year (e.g. 2024)" required min="0">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="add-isRead">
                    <label for="add-isRead">I have read this book</label>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="save-btn">Save</button>
                    <button type="button" class="cancel-btn" id="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="container" id="books-container">
        <div class="loader" id="loader">Loading books...</div>
    </div>
    
    <a href="/" class="nav-link">← Back to Home</a>
    <script src="Script.js"></script>
</body>
</html>
